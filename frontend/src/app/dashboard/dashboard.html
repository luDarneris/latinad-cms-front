<div class="min-h-screen bg-bg text-text">
  <header class="border-b border-border bg-surface px-4 py-4 md:px-6 lg:px-8">
    <div class="flex items-center justify-between gap-4">
      <div>
        <p class="text-xs font-semibold uppercase text-brand">LatinAd CMS</p>
        <h1 class="text-xl font-semibold text-text">Contenidos</h1>
      </div>

      <app-button
        label="Salir"
        icon="{{signOutIcon}}"
        icon-position="right"
        full-width="false"
        on-click="logout()">
      </app-button>
    </div>
  </header>

  <main class="px-4 py-6 md:px-6 lg:px-8">
    <section class="mb-6 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
      <div>
        <h2 class="text-2xl font-semibold text-text">Biblioteca de piezas</h2>
        <p class="mt-1 text-sm text-text-muted">
          {{contents.length}} contenidos cargados desde la API mock.
        </p>
      </div>
    </section>

    <section
      class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
      ng-if="isLoading">
      <div
        class="h-96 animate-pulse overflow-hidden rounded-xl border border-border bg-surface"
        ng-repeat="item in [1,2,3,4,5,6] track by $index">
        <div class="h-56 bg-gray-light"></div>
        <div class="space-y-4 p-4">
          <div class="h-5 w-3/4 rounded bg-gray-light"></div>
          <div class="flex gap-2">
            <div class="h-8 w-24 rounded-lg bg-gray-light"></div>
            <div class="h-8 w-20 rounded-lg bg-gray-light"></div>
          </div>
          <div class="h-4 w-28 rounded bg-gray-light"></div>
        </div>
      </div>
    </section>

    <div
      class="rounded-lg border border-danger bg-danger-soft px-4 py-3 text-sm font-medium text-danger"
      ng-if="!isLoading && errorMessage">
      {{errorMessage}}
    </div>

    <div
      class="rounded-lg border border-border bg-surface px-4 py-10 text-center text-sm text-text-muted"
      ng-if="!isLoading && !errorMessage && !contents.length">
      No hay contenidos para mostrar.
    </div>

    <section
      class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
      ng-if="!isLoading && !errorMessage && contents.length">
      <content-card
        ng-repeat="content in contents track by content.id"
        content="content"
        category-name="{{getCategoryName(content.category_id)}}"
        folder-name="{{getFolderName(content.folder_id)}}">
      </content-card>
    </section>
  </main>
</div>
