<div class="min-h-screen bg-bg text-text">
  <app-toast
    message="errorMessage"
    on-close="clearErrorMessage()">
  </app-toast>

  <topbar
    logo="{{logoCms}}"
    user="user"
    sign-out-icon="{{signOutIcon}}"
    on-logout="logout()">
  </topbar>

  <main class="px-4 py-6 md:px-6 lg:px-8">
    <section class="mb-5 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <h2 class="text-2xl font-semibold text-text">Biblioteca de contenido</h2>
      </div>

      <app-button
        label="Crear contenido"
        icon="{{addIcon}}"
        full-width="false">
      </app-button>
    </section>

    <section class="mb-6">
      <div class="relative">
        <img
          class="pointer-events-none absolute left-4 top-1/2 size-5 -translate-y-1/2 opacity-50 md:left-5 md:size-6"
          ng-src="{{searchIcon}}"
          alt="">

        <input
          class="h-12 w-full rounded-2xl border border-border bg-surface pl-12 pr-5 text-sm font-medium text-text shadow-sm outline-none transition placeholder:text-text-muted/70 focus:border-brand focus:shadow-md md:h-13 md:pl-14 md:pr-6 md:text-base"
          type="search"
          placeholder="Buscar contenido..."
          ng-model="contentFilters.search"
          ng-model-options="{ debounce: 250 }"
          ng-change="applyFilters()">
      </div>

      <div class="mt-4 flex gap-2 overflow-x-auto pb-1 md:gap-3">
        <span ng-repeat="filter in typeFilters track by filter.value">
          <filter-pill
            active="contentFilters.type === filter.value"
            label="{{filter.label}}"
            on-click="setTypeFilter(filter.value)">
          </filter-pill>
        </span>

        <span class="mx-1 hidden h-8 w-px shrink-0 bg-border md:block"></span>

        <app-select
          label="Filtrar por carpeta"
          name="folderFilter"
          placeholder="Todas las carpetas"
          model="contentFilters.folderId"
          options="folders"
          value-field="id"
          label-field="name"
          on-change="applyFilters('folderId', value)">
        </app-select>

        <app-select
          label="Filtrar por categoria"
          name="categoryFilter"
          placeholder="Todas las categorias"
          model="contentFilters.categoryId"
          options="categories"
          value-field="id"
          label-field="name"
          on-change="applyFilters('categoryId', value)">
        </app-select>
      </div>
    </section>

    <section
      class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"
      ng-if="!isLoading && !errorMessage">
      <p class="text-sm font-semibold text-text-muted">
        <span ng-if="!isSelectionMode">
          {{contents.length}} resultado{{contents.length === 1 ? '' : 's'}} encontrado{{contents.length === 1 ? '' : 's'}}
        </span>
        <span ng-if="isSelectionMode">
          {{getSelectedContentCount()}} seleccionado{{getSelectedContentCount() === 1 ? '' : 's'}}
        </span>
      </p>

      <div class="flex justify-end gap-2" ng-if="contents.length">
        <smol-button
          icon="{{archiveIcon}}"
          label="Archivar seleccionados"
          ng-if="isSelectionMode && getSelectedContentCount()">
        </smol-button>

        <app-button
          label="{{areAllVisibleContentsSelected() ? 'Deseleccionar todo' : 'Seleccionar todo'}}"
          full-width="false"
          variant="secondary"
          on-click="toggleAllVisibleContents()"
          ng-if="isSelectionMode">
        </app-button>

        <app-button
          label="{{isSelectionMode ? 'Cancelar seleccion' : 'Seleccionar'}}"
          full-width="false"
          variant="secondary"
          on-click="toggleSelectionMode()">
        </app-button>
      </div>
    </section>

    <section
      class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
      ng-if="isLoading">
      <div
        class="h-96 animate-pulse overflow-hidden rounded-xl border border-border bg-surface"
        ng-repeat="item in [1,2,3,4,5,6] track by $index">
        <div class="h-56 bg-gray-light"></div>
        <div class="space-y-4 p-4">
          <div class="h-5 w-3/4 rounded bg-gray-light"></div>
          <div class="flex gap-2">
            <div class="h-8 w-24 rounded-lg bg-gray-light"></div>
            <div class="h-8 w-20 rounded-lg bg-gray-light"></div>
          </div>
          <div class="h-4 w-28 rounded bg-gray-light"></div>
        </div>
      </div>
    </section>

    <div
      class="rounded-lg border border-border bg-surface px-4 py-10 text-center text-sm text-text-muted"
      ng-if="!isLoading && !errorMessage && !contents.length">
      No hay contenidos que coincidan con la busqueda o el filtro activo.
    </div>

    <section
      class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"
      ng-if="!isLoading && !errorMessage && contents.length">
      <content-card
        ng-repeat="content in contents track by content.id"
        content="content"
        category-name="{{getCategoryName(content.category_id)}}"
        folder-name="{{getFolderName(content.folder_id)}}"
        selected="isContentSelected(content.id)"
        show-checkbox="isSelectionMode"
        on-selection-change="setContentSelected(content, selected)">
      </content-card>
    </section>
  </main>
</div>
